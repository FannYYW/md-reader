<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MD Reader - Markdown 阅读器</title>
  <link rel="stylesheet" href="styles.css" />
  <!-- highlight.js 主题（明/暗动态切换） -->
  <link id="hljs-light" rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github.min.css" />
  <link id="hljs-dark" rel="stylesheet" disabled
    href="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/styles/github-dark.min.css" />
</head>
<body>
  <header class="toolbar">
    <div class="brand">
      <span class="logo">📖</span>
      <span class="title">MD Reader</span>
    </div>
    <div class="actions">
      <label class="btn" for="file-input">
        📂 打开 .md
        <input id="file-input" type="file" accept=".md,.markdown,text/markdown" hidden />
      </label>
      <button id="btn-toc" class="btn" title="切换目录">🧭 目录</button>
      <button id="btn-export-html" class="btn">⬇️ 导出 HTML</button>
      <button id="btn-export-pdf" class="btn">🖨️ 导出 PDF</button>
      <button id="btn-theme" class="btn" title="切换明暗主题">🌙</button>
    </div>
  </header>

  <main class="layout">
    <aside id="toc-panel" class="toc-panel" aria-label="目录">
      <h3>目录</h3>
      <nav id="toc"></nav>
    </aside>

    <section class="pane editor-pane">
      <div class="pane-header">编辑器</div>
      <textarea id="editor" spellcheck="false" placeholder="在这里输入 Markdown..."></textarea>
    </section>

    <section class="pane preview-pane">
      <div class="pane-header">预览</div>
      <article id="preview" class="markdown-body"></article>
    </section>
  </main>

  <!-- 第三方库：marked, highlight.js, html2pdf -->
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11.9.0/lib/highlight.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2pdf.js@0.10.1/dist/html2pdf.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
